name: ${COMPOSE_PROJECT_NAME:-heyi-kb-offline}

x-owner-labels: &owner-labels
  io.heyi.knowledgebases.owner: jiangsu-heyi-knowledgebases
  io.heyi.knowledgebases.stack: offline

x-api-environment: &api-environment
  KB_ENVIRONMENT: production
  KB_DEPLOYMENT_PROFILE: isolated
  KB_LLM_EGRESS_MODE: ${KB_LLM_EGRESS_MODE:-strict_offline}
  KB_LLM_EGRESS_GATEWAY_URL: ${KB_LLM_EGRESS_GATEWAY_URL:-}
  KB_LLM_EGRESS_APPROVED_PROVIDERS: ${KB_LLM_EGRESS_APPROVED_PROVIDERS:-}
  KB_DEBUG: "false"
  KB_DATABASE_URL: postgresql+asyncpg://${POSTGRES_APP_USER:?required}:${POSTGRES_APP_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:?required}
  KB_DATABASE_POOL_SIZE: ${KB_DATABASE_POOL_SIZE:-6}
  KB_DATABASE_MAX_OVERFLOW: ${KB_DATABASE_MAX_OVERFLOW:-2}
  KB_DATABASE_POOL_TIMEOUT_SECONDS: ${KB_DATABASE_POOL_TIMEOUT_SECONDS:-10}
  KB_DATABASE_STATEMENT_TIMEOUT_MS: ${KB_DATABASE_STATEMENT_TIMEOUT_MS:-15000}
  KB_DATABASE_LOCK_TIMEOUT_MS: ${KB_DATABASE_LOCK_TIMEOUT_MS:-5000}
  KB_DATABASE_IDLE_TRANSACTION_TIMEOUT_MS: ${KB_DATABASE_IDLE_TRANSACTION_TIMEOUT_MS:-30000}
  KB_CHAT_IDEMPOTENCY_TTL_SECONDS: "86400"
  KB_CHAT_IDEMPOTENCY_PROCESSING_TIMEOUT_SECONDS: "300"
  KB_CHAT_IDEMPOTENCY_RESPONSE_MAX_BYTES: "131072"
  KB_CHAT_IDEMPOTENCY_CLEANUP_BATCH_SIZE: "1000"
  KB_CHAT_IDEMPOTENCY_CLEANUP_MAX_BATCHES: "5"
  KB_CHAT_MAX_ACTIVE_REQUESTS: "8"
  KB_CHAT_SAFETY_STATE_PATH: /var/lib/kb-chat-safety/poison.json
  KB_CHAT_REPLAY_ENCRYPTION_KEYS: ${KB_CHAT_REPLAY_ENCRYPTION_KEYS:?required}
  KB_CHAT_REPLAY_ACTIVE_KEY_VERSION: ${KB_CHAT_REPLAY_ACTIVE_KEY_VERSION:?required}
  KB_REDIS_URL: redis://:${REDIS_PASSWORD:?required}@redis:6379/0
  KB_JWT_SECRET: ${KB_JWT_SECRET:?required}
  KB_BFF_SHARED_SECRET: ${KB_BFF_SHARED_SECRET:?required}
  KB_LLM_CREDENTIAL_ENCRYPTION_KEY: ${KB_LLM_CREDENTIAL_ENCRYPTION_KEY:?required}
  KB_S3_ENDPOINT_URL: http://minio:9000
  KB_S3_PUBLIC_ENDPOINT_URL: https://${KB_PUBLIC_HOST:?required}:${KB_OBJECTS_HTTPS_PORT:-19444}
  KB_S3_REGION: ${MINIO_REGION:-us-east-1}
  KB_S3_ACCESS_KEY: ${MINIO_APP_USER:?required}
  KB_S3_SECRET_KEY: ${MINIO_APP_PASSWORD:?required}
  KB_S3_BUCKET: ${MINIO_BUCKET:-knowledge-base}
  KB_S3_USE_SSL: "true"
  KB_S3_ADDRESSING_STYLE: path
  KB_TRUSTED_HOSTS: ${KB_TRUSTED_HOSTS:?required}
  KB_TRUSTED_PROXY_CIDRS: '["172.30.240.0/24"]'
  KB_CORS_ORIGINS: ${KB_CORS_ORIGINS:-[]}
  KB_MULTIPART_THRESHOLD_BYTES: ${KB_MULTIPART_THRESHOLD_BYTES:-104857600}
  KB_PLATFORM_MAX_UPLOAD_BYTES: "2147483648"
  KB_STORAGE_CAPACITY_PROBE_PATH: /var/lib/kb-capacity
  KB_STORAGE_WARNING_PERCENT: "70"
  KB_STORAGE_BULK_STOP_PERCENT: "80"
  KB_STORAGE_REJECT_PERCENT: "90"
  KB_STORAGE_OBJECT_STOP_BYTES: "180000000000"
  KB_MALWARE_SCAN_HOST: clamd
  KB_MALWARE_SCAN_PORT: 3310
  KB_MALWARE_SCAN_TIMEOUT_SECONDS: ${KB_MALWARE_SCAN_TIMEOUT_SECONDS:-120}
  KB_MALWARE_SCAN_MAX_STREAM_BYTES: "2147483648"
  KB_MALWARE_SCAN_CHUNK_SIZE_BYTES: ${KB_MALWARE_SCAN_CHUNK_SIZE_BYTES:-1048576}
  KB_MALWARE_SCAN_RECLAIM_SECONDS: ${KB_MALWARE_SCAN_RECLAIM_SECONDS:-300}

x-runtime-security: &runtime-security
  read_only: true
  tmpfs:
    - /tmp:size=128m,mode=1777
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true

x-logging: &default-logging
  driver: local
  options:
    max-size: 20m
    max-file: "5"

services:
  postgres:
    image: 127.0.0.1:5000/heyi-mirror/docker.io/library/postgres:17.5-bookworm@sha256:2088c1744625793a8a89118d2dee63fb121139141ff0ff53bd72e63bb6089d0d
    labels: *owner-labels
    restart: unless-stopped
    shm_size: 512m
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?required}
      POSTGRES_USER: ${POSTGRES_USER:?required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:?required}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:?required}
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - postgres
      - -c
      - max_connections=80
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1536MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - work_mem=4MB
      - -c
      - wal_compression=on
      - -c
      - log_min_duration_statement=1000
      - -c
      - statement_timeout=15s
      - -c
      - lock_timeout=5s
      - -c
      - idle_in_transaction_session_timeout=30s
    volumes:
      - type: bind
        source: ${KB_DATA_ROOT:?required}/postgres
        target: /var/lib/postgresql/data
      - ../../docker/postgres/init-runtime-role.sh:/docker-entrypoint-initdb.d/10-runtime-role.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    mem_limit: 2g
    cpus: 1.00
    stop_grace_period: 30s
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - backend

  redis:
    image: 127.0.0.1:5000/heyi-mirror/docker.io/library/redis:8.0.3-bookworm@sha256:97a98080e13ec15bc4684baa57e6f25a8cbce5c0372789194d04bfd178cb34d4
    labels: *owner-labels
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?required}
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - noeviction
      - --requirepass
      - ${REDIS_PASSWORD:?required}
    volumes:
      - type: bind
        source: ${KB_DATA_ROOT:?required}/redis
        target: /data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 3s
      retries: 20
    mem_limit: 768m
    cpus: 0.25
    stop_grace_period: 30s
    pids_limit: 128
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_READ_SEARCH
      - SETGID
      - SETPCAP
      - SETUID
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - backend

  minio:
    image: 127.0.0.1:5000/heyi-mirror/quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z@sha256:3f97c5651cb6662b880c787a232b6b34fec8d8922e08d6617b25d241a21164bb
    labels: *owner-labels
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?required}
      MINIO_REGION_NAME: ${MINIO_REGION:-us-east-1}
      MINIO_API_CORS_ALLOW_ORIGIN: https://${KB_PUBLIC_HOST:?required}:${KB_HTTPS_PORT:-19443}
    volumes:
      - type: bind
        source: ${KB_DATA_ROOT:?required}/minio
        target: /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    mem_limit: 1280m
    cpus: 0.75
    stop_grace_period: 30s
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - backend
      - frontend

  minio-init:
    image: 127.0.0.1:5000/heyi-mirror/quay.io/minio/mc:RELEASE.2025-04-16T18-13-26Z@sha256:2582c2f48b1e31545143ba5285c67d7b38c8b8f6912142d0630686dc7aaac28b
    labels: *owner-labels
    restart: "no"
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MC_CONFIG_DIR: /tmp/.mc
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?required}
      MINIO_APP_USER: ${MINIO_APP_USER:?required}
      MINIO_APP_PASSWORD: ${MINIO_APP_PASSWORD:?required}
      MINIO_BUCKET: ${MINIO_BUCKET:-knowledge-base}
    entrypoint: ["/bin/sh", "/opt/minio/init.sh"]
    volumes:
      - ../../docker/minio/init.sh:/opt/minio/init.sh:ro
    depends_on:
      minio:
        condition: service_healthy
    mem_limit: 128m
    cpus: 0.10
    pids_limit: 64
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - backend

  minio-multipart-gc:
    image: 127.0.0.1:5000/heyi-mirror/quay.io/minio/mc:RELEASE.2025-04-16T18-13-26Z@sha256:2582c2f48b1e31545143ba5285c67d7b38c8b8f6912142d0630686dc7aaac28b
    labels: *owner-labels
    restart: "no"
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MC_CONFIG_DIR: /tmp/.mc
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?required}
      MINIO_BUCKET: ${MINIO_BUCKET:-knowledge-base}
      MINIO_MULTIPART_MAX_AGE: ${MINIO_MULTIPART_MAX_AGE:-2d}
      MINIO_MULTIPART_CLEANUP_INTERVAL_SECONDS: ${MINIO_MULTIPART_CLEANUP_INTERVAL_SECONDS:-86400}
    entrypoint: ["/bin/sh", "/opt/minio/cleanup-multipart.sh"]
    volumes:
      - ../../docker/minio/cleanup-multipart.sh:/opt/minio/cleanup-multipart.sh:ro
    depends_on:
      minio-init:
        condition: service_completed_successfully
    mem_limit: 128m
    cpus: 0.05
    stop_grace_period: 30s
    pids_limit: 64
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - backend

  clamd:
    image: 127.0.0.1:5000/heyi-mirror/docker.io/clamav/clamav:1.4.3@sha256:d39ad368e587cc204f71675c3982adbc6717b8c4cb309a7ee9a3213f7e684c50
    labels: *owner-labels
    restart: unless-stopped
    entrypoint: ["clamd"]
    command: ["--foreground=true", "--config-file=/etc/clamav/clamd.conf"]
    volumes:
      - ../../docker/clamav/clamd.conf:/etc/clamav/clamd.conf:ro
      - type: bind
        source: ${KB_DATA_ROOT:?required}/clamav-db
        target: /var/lib/clamav
        read_only: true
    healthcheck:
      test: ["CMD-SHELL", "printf 'zPING\\0' | nc -w 2 127.0.0.1 3310 | grep -q PONG"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 120s
    read_only: true
    tmpfs:
      - /tmp:size=512m,mode=1777
    mem_limit: 1792m
    cpus: 0.50
    stop_grace_period: 30s
    pids_limit: 128
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - backend

  clamav-db-preflight:
    image: 127.0.0.1:5000/heyi-mirror/docker.io/clamav/clamav:1.4.3@sha256:d39ad368e587cc204f71675c3982adbc6717b8c4cb309a7ee9a3213f7e684c50
    labels: *owner-labels
    profiles: [ops]
    restart: "no"
    environment:
      CLAMAV_DATABASE_DIRECTORY: /var/lib/clamav
      CLAMAV_DATABASE_MAX_AGE_SECONDS: ${CLAMAV_DATABASE_MAX_AGE_SECONDS:-604800}
    entrypoint: ["/bin/sh", "/opt/clamav/preflight-database.sh"]
    volumes:
      - type: bind
        source: ${KB_DATA_ROOT:?required}/clamav-db
        target: /var/lib/clamav
        read_only: true
      - ../../docker/clamav/preflight-database.sh:/opt/clamav/preflight-database.sh:ro
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    mem_limit: 512m
    cpus: 0.25
    pids_limit: 64
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    network_mode: none

  api-preflight:
    image: ${KB_API_IMAGE:?required}
    labels: *owner-labels
    pull_policy: never
    profiles: [ops]
    restart: "no"
    volumes:
      - type: bind
        source: ${KB_DATA_ROOT:?required}/capacity-probe
        target: /var/lib/kb-capacity
        read_only: true
    <<: *runtime-security
    mem_limit: 768m
    cpus: 0.75
    pids_limit: 128
    logging: *default-logging
    network_mode: none

  migrate:
    image: ${KB_MIGRATION_IMAGE:?required}
    labels: *owner-labels
    pull_policy: never
    profiles: [ops]
    restart: "no"
    environment:
      <<: *api-environment
      KB_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?required}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:?required}
      KB_DATABASE_RUNTIME_ROLE: ${POSTGRES_APP_USER:?required}
      KB_BOOTSTRAP_DATABASE_URL: postgresql+asyncpg://${POSTGRES_APP_USER:?required}:${POSTGRES_APP_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:?required}
      KB_BOOTSTRAP_ADMIN_EMAIL: ${KB_BOOTSTRAP_ADMIN_EMAIL:?required}
      KB_BOOTSTRAP_ADMIN_PASSWORD: ${KB_BOOTSTRAP_ADMIN_PASSWORD:-}
    command:
      - python
      - /opt/heyi/run-migration-with-lock.py
      - --migrate-and-bootstrap
    volumes:
      - ./run-migration-with-lock.py:/opt/heyi/run-migration-with-lock.py:ro
    depends_on:
      postgres:
        condition: service_healthy
    <<: *runtime-security
    mem_limit: 768m
    cpus: 0.75
    pids_limit: 128
    logging: *default-logging
    networks:
      - backend

  bootstrap:
    image: ${KB_API_IMAGE:?required}
    labels: *owner-labels
    pull_policy: never
    profiles: [ops]
    restart: "no"
    environment:
      <<: *api-environment
      KB_BOOTSTRAP_ADMIN_EMAIL: ${KB_BOOTSTRAP_ADMIN_EMAIL:?required}
      KB_BOOTSTRAP_ADMIN_PASSWORD: ${KB_BOOTSTRAP_ADMIN_PASSWORD:-}
    command: ["python", "/opt/heyi/run-migration-with-lock.py", "--bootstrap-only"]
    volumes:
      - ./run-migration-with-lock.py:/opt/heyi/run-migration-with-lock.py:ro
    depends_on:
      postgres:
        condition: service_healthy
    <<: *runtime-security
    mem_limit: 768m
    cpus: 0.75
    pids_limit: 128
    logging: *default-logging
    networks:
      - backend

  api:
    image: ${KB_API_IMAGE:?required}
    labels: *owner-labels
    pull_policy: never
    restart: "no"
    init: true
    environment: *api-environment
    volumes:
      - type: bind
        source: ${KB_DATA_ROOT:?required}/capacity-probe
        target: /var/lib/kb-capacity
        read_only: true
      - type: bind
        source: ${KB_DATA_ROOT:?required}/chat-safety
        target: /var/lib/kb-chat-safety
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; request = urllib.request.Request('http://127.0.0.1:8000/health/ready', headers={'Host':'${KB_PUBLIC_HOST:?required}'}); urllib.request.urlopen(request, timeout=4)
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s
    <<: *runtime-security
    mem_limit: 1536m
    cpus: 1.25
    stop_grace_period: 120s
    pids_limit: 256
    logging: *default-logging
    networks:
      - backend
      - frontend
      - llm-control

  maintenance:
    image: ${KB_API_IMAGE:?required}
    labels: *owner-labels
    pull_policy: never
    restart: "no"
    init: true
    environment: *api-environment
    command: ["python", "-m", "app.maintenance", "--interval", "60"]
    volumes:
      - type: bind
        source: ${KB_DATA_ROOT:?required}/capacity-probe
        target: /var/lib/kb-capacity
        read_only: true
    depends_on:
      api:
        condition: service_healthy
      clamd:
        condition: service_healthy
    <<: *runtime-security
    mem_limit: 512m
    cpus: 0.25
    stop_grace_period: 120s
    pids_limit: 128
    logging: *default-logging
    networks:
      - backend
      - llm-control

  llm-egress:
    image: 127.0.0.1:5000/heyi-mirror/docker.io/library/caddy:2.10.2-alpine@sha256:d8c17a862962def15cde69863a3a463f25a2664942eafd7bdbf050e9c3116b83
    labels: *owner-labels
    profiles: [controlled-egress]
    pull_policy: never
    restart: "no"
    user: "10001:10001"
    volumes:
      - ./Caddyfile.llm-egress:/etc/caddy/Caddyfile:ro
    healthcheck:
      test:
        - CMD
        - /bin/busybox
        - sh
        - -ec
        - >-
          test "$(/bin/busybox wget -q -t 1 -T 2 -O -
          http://127.0.0.1:8080/_heyi/health/live 2>/dev/null |
          /bin/busybox sha256sum)" =
          "2317a728584609144fec1b10db497c29614244fcdc1d769ec031ce6a3f90255f  -"
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 5s
    read_only: true
    tmpfs:
      - /tmp:size=16m,uid=10001,gid=10001,mode=0700
      - /data:size=8m,uid=10001,gid=10001,mode=0700
      - /config:size=8m,uid=10001,gid=10001,mode=0700
    cap_drop:
      - ALL
    # The upstream image carries a file capability on /usr/bin/caddy. Keeping
    # NET_BIND_SERVICE in the bounding set is required for execve even though
    # this gateway binds only unprivileged port 8080.
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    cpus: 0.15
    stop_grace_period: 135s
    pids_limit: 64
    logging: *default-logging
    networks:
      - llm-control
      - llm-uplink

  web:
    image: ${KB_WEB_IMAGE:?required}
    labels: *owner-labels
    pull_policy: never
    restart: "no"
    init: true
    environment:
      FASTAPI_URL: http://api:8000
      FASTAPI_BFF_SHARED_SECRET: ${KB_BFF_SHARED_SECRET:?required}
      KB_PUBLIC_ORIGIN: ${KB_PUBLIC_ORIGIN:?required}
    depends_on:
      api:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /app/.next/cache:size=128m,uid=1000,gid=1000,mode=0755
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 768m
    cpus: 0.60
    stop_grace_period: 120s
    pids_limit: 256
    logging: *default-logging
    networks:
      - frontend

  maintenance-page:
    image: 127.0.0.1:5000/heyi-mirror/docker.io/library/caddy:2.10.2-alpine@sha256:d8c17a862962def15cde69863a3a463f25a2664942eafd7bdbf050e9c3116b83
    labels: *owner-labels
    profiles: [maintenance]
    restart: unless-stopped
    environment:
      KB_PUBLIC_HOST: ${KB_PUBLIC_HOST:?required}
      KB_OBJECTS_HTTPS_PORT: ${KB_OBJECTS_HTTPS_PORT:-19444}
    ports:
      - "${KB_BIND_ADDRESS:-127.0.0.1}:${KB_HTTPS_PORT:-19443}:8443"
      - "${KB_BIND_ADDRESS:-127.0.0.1}:${KB_OBJECTS_HTTPS_PORT:-19444}:9443"
    volumes:
      - ${KB_DATA_ROOT:?required}/maintenance/Caddyfile.maintenance:/etc/caddy/Caddyfile:ro
      - type: bind
        source: ${KB_DATA_ROOT:?required}/caddy-data
        target: /data
      - type: bind
        source: ${KB_DATA_ROOT:?required}/caddy-config
        target: /config
    healthcheck:
      test:
        - CMD
        - /bin/busybox
        - nc
        - -z
        - -w
        - "2"
        - 127.0.0.1
        - "8443"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    cpus: 0.15
    stop_grace_period: 30s
    pids_limit: 64
    logging: *default-logging
    networks:
      - edge

  proxy:
    image: 127.0.0.1:5000/heyi-mirror/docker.io/library/caddy:2.10.2-alpine@sha256:d8c17a862962def15cde69863a3a463f25a2664942eafd7bdbf050e9c3116b83
    labels: *owner-labels
    restart: "no"
    environment:
      KB_PUBLIC_HOST: ${KB_PUBLIC_HOST:?required}
      KB_OBJECTS_HTTPS_PORT: ${KB_OBJECTS_HTTPS_PORT:-19444}
    ports:
      - "${KB_BIND_ADDRESS:-127.0.0.1}:${KB_HTTPS_PORT:-19443}:8443"
      - "${KB_BIND_ADDRESS:-127.0.0.1}:${KB_OBJECTS_HTTPS_PORT:-19444}:9443"
    volumes:
      - ./Caddyfile.offline:/etc/caddy/Caddyfile:ro
      - type: bind
        source: ${KB_DATA_ROOT:?required}/caddy-data
        target: /data
      - type: bind
        source: ${KB_DATA_ROOT:?required}/caddy-config
        target: /config
    depends_on:
      web:
        condition: service_healthy
      minio:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    cpus: 0.15
    stop_grace_period: 30s
    pids_limit: 64
    logging: *default-logging
    networks:
      - edge
      - frontend

networks:
  edge:
    driver: bridge
    internal: true
    labels: *owner-labels
    ipam:
      config:
        - subnet: 172.30.242.0/24
  backend:
    driver: bridge
    internal: true
    labels: *owner-labels
    ipam:
      config:
        - subnet: 172.30.241.0/24
  frontend:
    driver: bridge
    internal: true
    labels: *owner-labels
    ipam:
      config:
        - subnet: 172.30.240.0/24
  llm-control:
    driver: bridge
    internal: true
    labels: *owner-labels
    ipam:
      config:
        - subnet: 172.30.243.0/24
  llm-uplink:
    driver: bridge
    labels: *owner-labels
    ipam:
      config:
        - subnet: 172.30.244.0/24
