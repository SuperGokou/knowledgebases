name: ${COMPOSE_PROJECT_NAME:-heyi-kb-prod}

x-api-build: &api-build
  context: ../..
  dockerfile: Dockerfile
  target: runtime

x-runtime-security: &runtime-security
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true

x-logging: &default-logging
  driver: local
  options:
    max-size: 10m
    max-file: "3"

services:
  migrate:
    image: ${KB_API_IMAGE:?KB_API_IMAGE is required}
    build: *api-build
    profiles: [ops]
    restart: "no"
    env_file:
      - path: ${KB_API_ENV_FILE:?KB_API_ENV_FILE is required}
        format: raw
    command: ["alembic", "upgrade", "head"]
    <<: *runtime-security
    mem_limit: 512m
    cpus: 0.50
    pids_limit: 128
    logging: *default-logging
    networks:
      - backend

  api:
    image: ${KB_API_IMAGE:?KB_API_IMAGE is required}
    build: *api-build
    restart: unless-stopped
    init: true
    env_file:
      - path: ${KB_API_ENV_FILE:?KB_API_ENV_FILE is required}
        format: raw
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=4)
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    <<: *runtime-security
    mem_limit: 1024m
    cpus: 1.25
    pids_limit: 256
    logging: *default-logging
    networks:
      - backend

  maintenance:
    image: ${KB_API_IMAGE:?KB_API_IMAGE is required}
    restart: unless-stopped
    init: true
    env_file:
      - path: ${KB_API_ENV_FILE:?KB_API_ENV_FILE is required}
        format: raw
    command: ["python", "-m", "app.maintenance", "--interval", "60"]
    depends_on:
      api:
        condition: service_healthy
    <<: *runtime-security
    mem_limit: 512m
    cpus: 0.50
    pids_limit: 128
    logging: *default-logging
    networks:
      - backend

  web:
    image: ${KB_WEB_IMAGE:?KB_WEB_IMAGE is required}
    build:
      context: ../../web
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    init: true
    env_file:
      - path: ${KB_WEB_ENV_FILE:?KB_WEB_ENV_FILE is required}
        format: raw
    depends_on:
      api:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /app/.next/cache:size=64m,uid=1000,gid=1000,mode=0755
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 768m
    cpus: 0.75
    pids_limit: 256
    logging: *default-logging
    networks:
      - edge
      - backend

  proxy:
    image: caddy:2.10.2-alpine@sha256:4c6e91c6ed0e2fa03efd5b44747b625fec79bc9cd06ac5235a779726618e530d
    restart: unless-stopped
    environment:
      KB_PUBLIC_HOST: ${KB_PUBLIC_HOST:?KB_PUBLIC_HOST is required}
    ports:
      - "${KB_BIND_ADDRESS:-0.0.0.0}:${KB_HTTPS_PORT:-18443}:8443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    cpus: 0.15
    pids_limit: 64
    logging: *default-logging
    networks:
      - edge

networks:
  edge:
    driver: bridge
  backend:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
