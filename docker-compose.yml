x-app-build: &app-build
  context: .
  target: runtime

x-app-environment: &app-environment
  KB_ENVIRONMENT: ${KB_ENVIRONMENT:-development}
  KB_DEBUG: ${KB_DEBUG:-false}
  KB_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-knowledge}:${POSTGRES_PASSWORD:?copy .env.example to .env}@postgres:5432/${POSTGRES_DB:-knowledge}
  KB_REDIS_URL: redis://:${REDIS_PASSWORD:?copy .env.example to .env}@redis:6379/0
  KB_JWT_SECRET: ${KB_JWT_SECRET:?copy .env.example to .env}
  KB_S3_ENDPOINT_URL: http://minio:9000
  KB_S3_PUBLIC_ENDPOINT_URL: ${KB_S3_PUBLIC_ENDPOINT_URL:-http://localhost:9000}
  KB_S3_REGION: ${MINIO_REGION:-us-east-1}
  KB_S3_ACCESS_KEY: ${MINIO_APP_USER:?copy .env.example to .env}
  KB_S3_SECRET_KEY: ${MINIO_APP_PASSWORD:?copy .env.example to .env}
  KB_S3_BUCKET: ${MINIO_BUCKET:-knowledge-base}
  KB_S3_USE_SSL: "false"
  KB_MULTIPART_THRESHOLD_BYTES: ${KB_MULTIPART_THRESHOLD_BYTES:-104857600}

services:
  postgres:
    image: postgres:17.5-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-knowledge}
      POSTGRES_USER: ${POSTGRES_USER:-knowledge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?copy .env.example to .env}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - backend

  redis:
    image: redis:8.0.3-bookworm
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?copy .env.example to .env}
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:?copy .env.example to .env}
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?copy .env.example to .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?copy .env.example to .env}
      MINIO_REGION_NAME: ${MINIO_REGION:-us-east-1}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-04-16T18-13-26Z
    restart: "no"
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?copy .env.example to .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?copy .env.example to .env}
      MINIO_APP_USER: ${MINIO_APP_USER:?copy .env.example to .env}
      MINIO_APP_PASSWORD: ${MINIO_APP_PASSWORD:?copy .env.example to .env}
      MINIO_BUCKET: ${MINIO_BUCKET:-knowledge-base}
    entrypoint: ["/bin/sh", "/opt/minio/init.sh"]
    volumes:
      - ./docker/minio/init.sh:/opt/minio/init.sh:ro
    depends_on:
      minio:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  minio-multipart-gc:
    image: quay.io/minio/mc:RELEASE.2025-04-16T18-13-26Z
    restart: unless-stopped
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?copy .env.example to .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?copy .env.example to .env}
      MINIO_BUCKET: ${MINIO_BUCKET:-knowledge-base}
      MINIO_MULTIPART_MAX_AGE: ${MINIO_MULTIPART_MAX_AGE:-2d}
      MINIO_MULTIPART_CLEANUP_INTERVAL_SECONDS: ${MINIO_MULTIPART_CLEANUP_INTERVAL_SECONDS:-86400}
    entrypoint: ["/bin/sh", "/opt/minio/cleanup-multipart.sh"]
    volumes:
      - ./docker/minio/cleanup-multipart.sh:/opt/minio/cleanup-multipart.sh:ro
    depends_on:
      minio-init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  migrate:
    image: enterprise-knowledge-base-api:local
    build: *app-build
    restart: "no"
    environment: *app-environment
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  bootstrap:
    image: enterprise-knowledge-base-api:local
    build: *app-build
    restart: "no"
    environment:
      <<: *app-environment
      KB_BOOTSTRAP_ADMIN_EMAIL: ${KB_BOOTSTRAP_ADMIN_EMAIL:-admin@example.com}
      KB_BOOTSTRAP_ADMIN_PASSWORD: ${KB_BOOTSTRAP_ADMIN_PASSWORD:?copy .env.example to .env}
    command: ["python", "-m", "app.bootstrap"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  app:
    image: enterprise-knowledge-base-api:local
    build: *app-build
    restart: unless-stopped
    init: true
    environment: *app-environment
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:8000"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=3)
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  maintenance:
    image: enterprise-knowledge-base-api:local
    build: *app-build
    restart: unless-stopped
    init: true
    environment: *app-environment
    command: ["python", "-m", "app.maintenance", "--interval", "60"]
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  backend:
    driver: bridge
